validSearchTerms=grater,cool tools,cutting board
invalidSearchTerms=spaceship,unicorn

useIncognito=true
maxRetries=3

# Dynamic category/product from sitemap (Magento index often names *category* / *product* child sitemaps)
sitemapUrl=https://www.colbrookkitchen.com/sitemap.xml
sitemapConnectTimeoutMs=30000
sitemapReadTimeoutMs=30000
# If sitemap is empty or unreachable, PLP fallback uses fallbackCategoryUrl; optional direct product URL:
fallbackCategoryUrl=https://www.colbrookkitchen.com/cool-tools/gifts.html
fallbackProductUrl=
# Comma-separated extra product URLs if sitemap + PLP do not yield enough distinct items
fallbackProductUrls=
# Each run picks a random count in this inclusive range (distinct URLs from sitemap when possible)
sitemapDynamicProductCountMin=3
sitemapDynamicProductCountMax=4
# Pool of PDP URLs to try (skip pages without Add to Cart until target count is reached)
sitemapMaxProductCandidates=50
sitemapMinProductCandidatePool=12
addToCartButtonWaitSeconds=8
# Magento configurable: passes over super-attribute & swatch widgets; settle time between selections (ms)
configurableOptionMaxPasses=8
configurableOptionSettleMs=450
# URLs with this many or more path segments are treated as products when the sitemap does not name category vs product files
sitemapProductMinPathSegments=3
