# Automation Configuration - Colbrook Kitchen
basePath=C:/Users/deepa/Documents/Automation/Colbrook
browserTimeout=15
pageLoadTimeout=30

csvPath=C:/Users/deepa/Documents/Automation/Colbrook/Colbrook.csv

imgbbApiKey=3b23b07a37fbcee41d4984d100162a10

discountCode=exitest

email=deepak.maheshwari@exinent.com
